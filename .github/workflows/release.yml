name: Release to PyPI & package repos

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true    # hatch-vcs needs full tag history for version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag matches built version
        run: |
          pip install hatchling hatch-vcs
          RAW_TAG="${GITHUB_REF#refs/tags/v}"
          TAG=$(python -c "from packaging.version import Version; print(Version('$RAW_TAG'))")
          PKG_VERSION=$(hatchling version)
          echo "Git tag: v$RAW_TAG → Normalized: $TAG → Package version: $PKG_VERSION"
          [ "$TAG" = "$PKG_VERSION" ] || { echo "::error::Normalized tag $TAG does not match package version $PKG_VERSION"; exit 1; }

      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: sudo apt-get update && sudo apt-get install -y rpm pandoc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build hatch-vcs

      - name: Extract version from tag
        id: version
        run: |
          RAW="${GITHUB_REF#refs/tags/v}"
          NORMALIZED=$(python -c "from packaging.version import Version; print(Version('$RAW'))")
          echo "version=$NORMALIZED" >> "$GITHUB_OUTPUT"

      - name: Inject version into RPM spec
        run: sed -i "s/@@VERSION@@/${{ steps.version.outputs.version }}/g" packaging/rpm/pcp-pmda-unifi.spec

      - name: Build wheel
        run: python -m build --wheel

      - name: Prepare rpmbuild tree
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          cp dist/pcp_pmda_unifi-*.whl ~/rpmbuild/SOURCES/
          cp packaging/rpm/pcp-pmda-unifi.spec ~/rpmbuild/SPECS/

      - name: Build man page
        run: pandoc man/pmdaunifi.1.md -s -t man -o ~/rpmbuild/SOURCES/pmdaunifi.1

      - name: Build RPM (noarch)
        run: rpmbuild -bb --nodeps ~/rpmbuild/SPECS/pcp-pmda-unifi.spec --define "_topdir $HOME/rpmbuild"

      - name: Collect RPM artifacts
        id: rpm-collect
        run: |
          mkdir -p rpms
          cp ~/rpmbuild/RPMS/noarch/*.rpm rpms/ 2>/dev/null && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Upload RPM artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: rpms/*.rpm
        if: steps.rpm-collect.outputs.found == 'true'

  deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dh-python \
            pybuild-plugin-pyproject python3-all python3-setuptools \
            python3-hatchling python3-hatch-vcs pcp pandoc

      - name: Extract version from tag
        id: version
        run: |
          RAW="${GITHUB_REF#refs/tags/v}"
          NORMALIZED=$(python -c "from packaging.version import Version; print(Version('$RAW'))")
          echo "version=$NORMALIZED" >> "$GITHUB_OUTPUT"

      - name: Build man page
        run: |
          mkdir -p debian
          pandoc man/pmdaunifi.1.md -s -t man -o debian/pmdaunifi.1

      - name: Prepare debian directory
        run: |
          cp packaging/deb/control debian/control
          cp packaging/deb/rules debian/rules
          cp packaging/deb/postinst debian/postinst 2>/dev/null || true
          chmod +x debian/rules
          VERSION="${{ steps.version.outputs.version }}"
          cat > debian/changelog << CHANGELOG
          pcp-pmda-unifi (${VERSION}-1) unstable; urgency=low

            * Release ${VERSION}

           -- pmdaunifi contributors <pmdaunifi@users.noreply.github.com>  $(date -R)
          CHANGELOG
          echo "debian/pmdaunifi.1" > debian/pcp-pmda-unifi.manpages

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b

      - name: Collect .deb artifacts
        id: deb-collect
        run: |
          mkdir -p debs
          cp ../*.deb debs/ 2>/dev/null && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
        if: steps.deb-collect.outputs.found == 'true'
