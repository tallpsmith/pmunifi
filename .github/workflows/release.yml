name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y rpm rpmlint pandoc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build

      - name: Build sdist for RPM source
        run: python -m build --sdist

      - name: Prepare rpmbuild tree
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          # Rename sdist to match RPM Source0 expectation
          cp dist/pcp_pmda_unifi-${VERSION}.tar.gz \
             ~/rpmbuild/SOURCES/pcp-pmda-unifi-${VERSION}.tar.gz
          cp packaging/rpm/pcp-pmda-unifi.spec ~/rpmbuild/SPECS/

      - name: Build man page
        run: pandoc man/pmdaunifi.1.md -s -t man -o ~/rpmbuild/SOURCES/pmdaunifi.1

      - name: Build RPM (noarch)
        run: rpmbuild -bb ~/rpmbuild/SPECS/pcp-pmda-unifi.spec --define "_topdir $HOME/rpmbuild"
        continue-on-error: true

      - name: Upload RPM artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ~/rpmbuild/RPMS/noarch/*.rpm
        if: hashFiles('~/rpmbuild/RPMS/noarch/*.rpm') != ''

  deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dh-python python3-all \
            python3-setuptools pcp pandoc

      - name: Build man page
        run: |
          mkdir -p debian
          pandoc man/pmdaunifi.1.md -s -t man -o debian/pmdaunifi.1

      - name: Prepare debian directory
        run: |
          cp packaging/deb/control debian/control
          cp packaging/deb/rules debian/rules
          cp packaging/deb/postinst debian/postinst 2>/dev/null || true
          chmod +x debian/rules
          # Create changelog from git tag
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          cat > debian/changelog << CHANGELOG
          pcp-pmda-unifi (${VERSION}-1) unstable; urgency=low

            * Release ${VERSION}

           -- pmdaunifi contributors <pmdaunifi@users.noreply.github.com>  $(date -R)
          CHANGELOG
          # Install man page via .manpages file
          echo "debian/pmdaunifi.1" > debian/pcp-pmda-unifi.manpages

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b
        continue-on-error: true

      - name: Upload .deb artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ../*.deb
        if: hashFiles('../*.deb') != ''
