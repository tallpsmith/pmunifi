name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check src/ tests/
      - run: |
          uv pip install --system mypy types-requests
          mypy src/pcp_pmda_unifi/ --ignore-missing-imports

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system pytest pytest-cov requests flask
      - run: uv pip install --system -e . --no-deps
      - run: pytest tests/unit/ -m unit --cov=pcp_pmda_unifi --cov-report=xml -v
      - uses: codecov/codecov-action@v4
        if: always()

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y pcp python3-pcp
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system -e ".[test]"
      - run: pytest tests/integration/ -m integration -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y pcp python3-pcp python3-pip python3-venv
      - run: |
          sudo systemctl start pmcd
          . /etc/pcp.env && "$PCP_BINADM_DIR/pmcd_wait" -t 10
      # E2E tests use the SYSTEM Python so pmpython/pcp.pmda bindings work
      # under sudo without PYTHONPATH hacks.
      - run: |
          sudo pip install --break-system-packages --ignore-installed -e ".[test]"
      - name: Start mock UniFi API
        run: python3 tests/e2e/mock_server.py &
      - run: python3 -m pytest tests/e2e/ -m e2e -v
