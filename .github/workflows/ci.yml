name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: mypy src/pcp_pmda_unifi/ --ignore-missing-imports

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]" --no-deps || pip install pytest pytest-cov requests flask
      - run: pip install -e . --no-deps || true
      - run: pytest tests/unit/ -m unit --cov=pcp_pmda_unifi --cov-report=xml -v
      - uses: codecov/codecov-action@v4
        if: always()

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y pcp python3-pcp
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]"
      - run: pytest tests/integration/ -m integration -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y pcp python3-pcp
      - run: sudo systemctl start pmcd && pmcd_wait -t 10
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[test]"
      - run: pytest tests/e2e/ -m e2e -v
